services:
  taskorg:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${TASKORG_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      TASKORG_HOME: "/taskorg"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      TASKORG_DEPLOYMENT_MODE: "authenticated"
      TASKORG_DEPLOYMENT_EXPOSURE: "private"
      TASKORG_PUBLIC_URL: "${TASKORG_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${TASKORG_DATA_DIR:-../data/docker-taskorg}:/taskorg"
