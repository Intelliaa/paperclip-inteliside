services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: taskorg
      POSTGRES_PASSWORD: taskorg
      POSTGRES_DB: taskorg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskorg -d taskorg"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://taskorg:taskorg@db:5432/taskorg
      PORT: "3100"
      SERVE_UI: "true"
      TASKORG_DEPLOYMENT_MODE: "authenticated"
      TASKORG_DEPLOYMENT_EXPOSURE: "private"
      TASKORG_PUBLIC_URL: "${TASKORG_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - taskorg-data:/taskorg
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  taskorg-data:
