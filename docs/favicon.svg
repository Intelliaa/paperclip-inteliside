<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .dark { display: none; }
    .light { display: inline; }
    @media (prefers-color-scheme: dark) {
      .dark { display: inline; }
      .light { display: none; }
    }
  </style>
  <image class="light" href="data:image/png;base64," width="100" height="100"/>
  <image class="dark" href="data:image/png;base64," width="100" height="100"/>
</svg>
